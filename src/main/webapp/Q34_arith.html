<!DOCTYPE html>
<html>
<head><title>Arithmetic Calculator</title></head>
<body>
    <h2>Q34 - Arithmetic Division</h2>
    <p>Enter two numbers to perform division:</p>
    <form action="Q34_calculate.jsp" method="post">
        <label>Number 1 (Dividend):</label><br>
        <input type="text" name="num1" required><br><br>
        <label>Number 2 (Divisor):</label><br>
        <input type="text" name="num2" required><br><br>
        <input type="submit" value="Divide">
    </form>
    <p><small>(Enter 0 as divisor to trigger an ArithmeticException)</small></p>
</body>
</html>
