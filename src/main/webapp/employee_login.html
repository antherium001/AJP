<!DOCTYPE html>
<html>
<head>
    <title>Employee Login</title>
</head>
<body style="font-family:Arial; margin:40px;">
    <h2 style="text-align:center; color:#333;">Employee Login System</h2>
    <p style="text-align:center; color:#666;">Enter your credentials to access the employee portal.</p>

    <form action="EmployeeLogin" method="post"
          style="max-width:350px; margin:auto; padding:25px; border:2px solid #4CAF50; border-radius:8px;">

        <label><b>Username:</b></label><br>
        <input type="text" name="username" required
               style="width:100%; padding:8px; margin:8px 0 16px; box-sizing:border-box;">

        <label><b>Password:</b></label><br>
        <input type="password" name="password" required
               style="width:100%; padding:8px; margin:8px 0 16px; box-sizing:border-box;">

        <input type="submit" value="Login"
               style="width:100%; padding:10px; background-color:#4CAF50; color:white;
                      border:none; border-radius:4px; cursor:pointer; font-size:16px;">
    </form>

    <p style="text-align:center; color:#999; margin-top:20px; font-size:12px;">
        Predefined users: admin, john, priya, rahul
    </p>
</body>
</html>
