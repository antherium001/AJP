<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
</head>
<body style="font-family:Arial; margin:40px;">
    <h2 style="text-align:center; color:#333;">Shopping Cart - Select Items</h2>

    <form action="ShoppingCart" method="post" style="max-width:400px; margin:auto;">
        <fieldset style="padding:20px; border:2px solid #4CAF50; border-radius:8px;">
            <legend style="font-weight:bold; color:#4CAF50;">Choose Products</legend>

            <p><input type="checkbox" name="items" value="Laptop"> Laptop</p>
            <p><input type="checkbox" name="items" value="Phone"> Phone</p>
            <p><input type="checkbox" name="items" value="Headphones"> Headphones</p>
            <p><input type="checkbox" name="items" value="Mouse"> Mouse</p>
            <p><input type="checkbox" name="items" value="Keyboard"> Keyboard</p>
            <p><input type="checkbox" name="items" value="Monitor"> Monitor</p>

            <br>
            <input type="hidden" name="action" value="add">
            <input type="submit" value="Add to Cart"
                   style="background-color:#4CAF50; color:white; padding:10px 20px; border:none; border-radius:4px; cursor:pointer; font-size:14px;">
        </fieldset>
    </form>

    <p style="text-align:center; margin-top:20px;">
        <a href="ShoppingCart">View Cart</a>
    </p>
</body>
</html>
