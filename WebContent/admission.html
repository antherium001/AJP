<!DOCTYPE html>
<html>
<head>
    <title>Admission Form</title>
</head>
<body>
    <h2>Student Admission Form</h2>
    <form action="Admission" method="post">
        <label>Student Name:</label><br>
        <input type="text" name="studentName" required><br><br>
        <label>Father's Name:</label><br>
        <input type="text" name="fatherName" required><br><br>
        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required><br><br>
        <label>Course:</label><br>
        <select name="course" required>
            <option value="">--Select--</option>
            <option value="B.Tech">B.Tech</option>
            <option value="BCA">BCA</option>
            <option value="MCA">MCA</option>
            <option value="M.Tech">M.Tech</option>
            <option value="MBA">MBA</option>
        </select><br><br>
        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>
        <label>Phone:</label><br>
        <input type="tel" name="phone" pattern="[0-9]{10}" required><br><br>
        <label>Address:</label><br>
        <textarea name="address" rows="3" cols="40" required></textarea><br><br>
        <input type="submit" value="Submit Admission">
    </form>
</body>
</html>
