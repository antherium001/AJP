<!DOCTYPE html>
<html>
<head>
    <title>Student Mark Sheet</title>
</head>
<body>
    <h2>Student Mark Sheet Entry</h2>
    <form action="MarkSheet" method="post">
        <label>Student Name:</label><br>
        <input type="text" name="studentName" required><br><br>
        <label>Roll Number:</label><br>
        <input type="text" name="rollNo" required><br><br>
        <label>Maths (0-100):</label><br>
        <input type="number" name="maths" min="0" max="100" required><br><br>
        <label>English (0-100):</label><br>
        <input type="number" name="english" min="0" max="100" required><br><br>
        <label>Science (0-100):</label><br>
        <input type="number" name="science" min="0" max="100" required><br><br>
        <label>Computer Science (0-100):</label><br>
        <input type="number" name="cs" min="0" max="100" required><br><br>
        <input type="submit" value="Generate Mark Sheet">
    </form>
</body>
</html>
