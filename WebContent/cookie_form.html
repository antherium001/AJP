<!DOCTYPE html>
<html>
<head>
    <title>Add Cookie</title>
</head>
<body>
    <h2>Add Data to Cookies</h2>
    <form action="CookieDemo" method="get">
        <input type="hidden" name="action" value="add">
        <label>Cookie Name (Key):</label><br>
        <input type="text" name="key" required><br><br>
        <label>Cookie Value:</label><br>
        <input type="text" name="value" required><br><br>
        <input type="submit" value="Add Cookie">
    </form>
    <br>
    <a href="CookieDemo">View All Cookies</a>
</body>
</html>
